version: "2"

run:
  timeout: 15m
  concurrency: 5
  verbose: true
  skip-dirs:
  - "templates"
  - "pipelines"
  - "cmd"

issues:
  exclude-dirs:
  - mocks
  exclude-files:
  - vendor
  exclude-rules:
  - path: _test\.go
    linters:
    - errcheck
    - gosec

linters:
  disable:
  - godox
  - staticcheck # Devemos habilitar em breve
  - gosec # Devemos habilitar em breve
  enable-all: false
  enable:
  - bodyclose
  - gochecknoinits
  - gocritic
  - errcheck
  - godot
  - govet
  - gocyclo
  - ineffassign
  - forbidigo
  settings:
    forbidigo:
      # Enforce structured logging rule R-O11Y-001 in pkg/http_server/ (RF-11.2).
      # Repo-wide enforcement is a separate ticket.
      forbid:
        - pattern: "^log\\.Printf$"
          msg: "use structured logging via pkg/observability (R-O11Y-001)"
        - pattern: "^log\\.Println$"
          msg: "use structured logging via pkg/observability (R-O11Y-001)"
        - pattern: "^fmt\\.Println$"
          msg: "use structured logging via pkg/observability (R-O11Y-001)"
        - pattern: "^fmt\\.Printf$"
          msg: "use structured logging via pkg/observability (R-O11Y-001)"
  exclusions:
    rules:
      # Restrict forbidigo gate to pkg/http_server/ only (RF-11.2 scope).
      # All packages below are explicitly excluded; repo-wide gate is a separate ticket.
      - linters:
          - forbidigo
        path: "pkg/(database|encrypt|entity|events|httpclient|linq|logger|messaging|nullable|observability|responses|vos)/"
