services:
  lgtm:
    image: grafana/otel-lgtm:0.7.5
    container_name: devkit-go-lgtm
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    networks:
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.121.0
    container_name: devkit-go-otel-collector
    command: ["--config=/etc/otelcol-contrib/otel-collector.yml"]
    volumes:
      - ./collector/otel-collector.yml:/etc/otelcol-contrib/otel-collector.yml:ro
    ports:
      - "4319:4317"
      - "4320:4318"
      - "8889:8889"
    depends_on:
      - lgtm
    networks:
      - observability

  postgres:
    image: postgres:15-alpine
    container_name: devkit-go-lgtm-postgres
    environment:
      POSTGRES_DB: devkit
      POSTGRES_USER: devkit
      POSTGRES_PASSWORD: devkit
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devkit -d devkit"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - observability

  lgtm-demo:
    build:
      context: ../..
      dockerfile: pkg/observability/examples/lgtm-demo/Dockerfile
    container_name: devkit-go-lgtm-demo
    environment:
      APP_ADDR: ":8080"
      APP_ENVIRONMENT: local
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: devkit-go-lgtm-demo
      OTEL_SERVICE_VERSION: "0.1.0"
      DATABASE_DSN: postgres://devkit:devkit@postgres:5432/devkit?sslmode=disable
    ports:
      - "8088:8080"
    depends_on:
      otel-collector:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/readyz >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - observability

networks:
  observability:
    name: devkit-go-observability
